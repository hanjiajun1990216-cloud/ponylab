version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ponylab-postgres
    environment:
      POSTGRES_USER: ponylab
      POSTGRES_PASSWORD: ponylab_dev
      POSTGRES_DB: ponylab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponylab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ponylab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: ponylab-meilisearch
    environment:
      MEILI_MASTER_KEY: ponylab_meili_dev_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: ponylab-minio
    environment:
      MINIO_ROOT_USER: ponylab
      MINIO_ROOT_PASSWORD: ponylab_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
