services:
  - type: web
    name: ponylab-api
    env: node
    region: oregon
    plan: free
    nodeVersion: "22.22.0"
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && npx prisma generate --schema=packages/database/prisma/schema.prisma && pnpm exec turbo build --filter=@ponylab/api...
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
